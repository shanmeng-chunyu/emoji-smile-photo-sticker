<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Emoji 图片编辑器</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="toolbar">
        <div class="brand">Emoji 图片编辑器</div>
        <div class="actions">
          <label class="button primary" for="imageInput">导入图片</label>
          <div class="zoom-controls" aria-label="视图缩放">
            <button id="zoomOutButton" class="button icon-button" type="button" disabled aria-label="缩小" title="缩小">−</button>
            <button id="resetViewButton" class="button fit-button" type="button" disabled>适配</button>
            <button id="zoomInButton" class="button icon-button" type="button" disabled aria-label="放大" title="放大">+</button>
          </div>
          <button id="exportButton" class="button" type="button" disabled>导出 PNG</button>
          <button id="clearButton" class="button ghost" type="button" disabled>清空</button>
        </div>
        <div id="statusText" class="status" aria-live="polite">未导入图片</div>
      </header>

      <section class="workspace" aria-label="图片编辑区域">
        <div id="canvasStage" class="canvas-stage">
          <canvas id="editorCanvas"></canvas>
          <div id="emptyState" class="empty-state">
            <label class="button primary large" for="imageInput">导入图片</label>
          </div>
        </div>
      </section>
      <input id="imageInput" class="file-input" type="file" accept="image/*" />
    </main>

    <script src="./app.js"></script>
  </body>
</html>
